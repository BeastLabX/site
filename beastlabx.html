<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BeastLabX App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="BeastLabX App — Serious training log for lifters">

<style>

/* =============================================================
   PAGE BASE
============================================================= */
*{
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:
linear-gradient(rgba(15,15,18,0.74), rgba(15,15,18,0.80)),
url('bg.png') center center / cover fixed no-repeat;
color:#e5e5e5;
}

/* =============================================================
   HEADER
============================================================= */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
border-bottom:2px solid #1FA11F;
background:rgba(15,15,18,0.92);
backdrop-filter:blur(6px);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 8px 28px rgba(0,0,0,0.20);
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:bold;
color:#ffffff;
text-decoration:none;
min-width:0;
}

.logo img{
height:40px;
width:auto;
display:block;
}

.logo span{
white-space:nowrap;
letter-spacing:0.2px;
}

nav{
display:flex;
align-items:center;
gap:24px;
}

nav a{
position:relative;
text-decoration:none;
color:#ffffff;
font-size:16px;
padding:6px 0;
transition:color 0.2s ease, opacity 0.2s ease;
}

nav a:hover{
color:#1FA11F;
}

nav a.active{
color:#1FA11F;
}

nav a.active::after{
content:"";
position:absolute;
left:0;
bottom:-8px;
width:100%;
height:2px;
background:#1FA11F;
box-shadow:0 0 10px rgba(31,161,31,0.45);
}

.menu-toggle{
display:none;
background:none;
border:none;
padding:6px;
cursor:pointer;
}

.menu-toggle span{
display:block;
width:24px;
height:2px;
background:#ffffff;
margin:5px 0;
border-radius:2px;
transition:0.2s ease;
}

/* =============================================================
   HERO
============================================================= */
.hero{
position:relative;
padding:92px 20px 74px 20px;
text-align:center;
background:linear-gradient(to bottom, rgba(10,10,12,0.76), rgba(10,10,12,0.56));
overflow:hidden;
}

.hero-inner{
position:relative;
z-index:1;
max-width:980px;
margin:0 auto;
}

.hero-label{
display:inline-block;
margin-bottom:18px;
padding:8px 14px;
border:1px solid rgba(31,161,31,0.34);
border-radius:999px;
background:rgba(31,161,31,0.10);
color:#CFEFCF;
font-size:13px;
font-weight:bold;
letter-spacing:0.08em;
text-transform:uppercase;
}

.hero img.app-icon{
width:118px;
height:auto;
margin:0 0 22px 0;
display:inline-block;
}

.hero h1{
margin:0 0 18px 0;
font-size:60px;
line-height:1.02;
color:#ffffff;
}

.hero p{
font-size:19px;
color:#BDBDBD;
max-width:780px;
margin:0 auto;
line-height:1.75;
}

/* =============================================================
   DIVIDER
============================================================= */
.section-divider{
height:2px;
background:#1FA11F;
box-shadow:0 0 18px rgba(31,161,31,0.45);
}

/* =============================================================
   MOBILE
============================================================= */
@media (max-width:768px){

.menu-toggle{
display:block;
margin-left:auto;
}

nav{
display:none;
width:100%;
flex-direction:column;
align-items:center;
gap:18px;
padding:18px 0 8px 0;
border-top:1px solid #2A2A2A;
margin-top:10px;
}

nav.open{
display:flex;
}

}

</style>
</head>

<body>

<header>

<a href="index.html" class="logo">
<img src="logo.png" alt="BeastLabX">
<span>BeastLabX</span>
</a>

<button class="menu-toggle" id="menuToggle">
<span></span>
<span></span>
<span></span>
</button>

<nav id="siteNav">
<a href="index.html">Home</a>
<a href="apps.html" class="active">Apps</a>
<a href="about.html">About</a>
<a href="faq.html">FAQ</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="hero">
<div class="hero-inner">
<div class="hero-label">BeastLabX Ecosystem</div>
<img class="app-icon" src="app-logo.png" alt="BeastLabX App">
<h1>BeastLabX App</h1>
<p>
Serious training log for lifters.
Track workouts, structured programs, and HIIT sessions without unnecessary clutter.
</p>
</div>
</section>

<div class="section-divider"></div>

<section class="cta">
<h2>BeastLabX App</h2>
<p>The BeastLabX App is currently in development.</p>
<a class="cta-button" href="apps.html">Back to Apps</a>
</section>

<div id="footer-placeholder"></div>

<script>
const menuToggle = document.getElementById('menuToggle');
const siteNav = document.getElementById('siteNav');

menuToggle.addEventListener('click', function () {
const isOpen = siteNav.classList.toggle('open');
menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

window.addEventListener('resize', function () {
if (window.innerWidth > 768) {
siteNav.classList.remove('open');
menuToggle.setAttribute('aria-expanded', 'false');
}
});

fetch("footer.html")
.then(response => response.text())
.then(data => {
document.getElementById("footer-placeholder").innerHTML = data;
});
</script>

</body>
</html>
