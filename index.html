<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BeastLabX – Company</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial;
background:#0f0f12;
color:#e5e5e5;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
border-bottom:2px solid #1FA11F;
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:#fff;
text-decoration:none;
font-weight:bold;
}

.logo img{width:36px;height:36px;object-fit:cover;}

/* HERO */
.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
padding:60px 30px;
}

.hero h1{font-size:48px;margin:0;}
.hero p{color:#aaa;line-height:1.6;}

.hero-ad{
border-radius:20px;
overflow:hidden;
}

.hero-ad img{
width:100%;
height:100%;
object-fit:cover;
}

/* APPS */
.apps{
padding:40px 30px;
}

.apps-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.app-card{
background:#1a1a1f;
padding:20px;
border-radius:16px;
text-decoration:none;
color:#fff;
}

.app-logo{
width:60px;
height:60px;
margin-bottom:15px;
}

.app-logo img{
width:100%;
height:100%;
object-fit:contain;
}

.app-card h3{margin:0 0 8px 0;}
.app-card p{color:#aaa;font-size:14px;}

/* MOBILE */
@media(max-width:900px){
.hero{grid-template-columns:1fr;}
.apps-grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header>
<a class="logo" href="index.html">
<img src="logo.png">
BeastLabX
</a>
</header>

<section class="hero">

<div>
<h1>BeastLabX</h1>
<p>Practical apps built for real-world use.</p>
</div>

<div class="hero-ad">
<img src="bl-ad.png">
</div>

</section>

<section class="apps">

<div class="apps-grid">

<div class="app-card">
<div class="app-logo"><img src="bl-logo.png"></div>
<h3>BeastLabX</h3>
<p>Workout tracking and progression</p>
</div>

<div class="app-card">
<div class="app-logo"><img src="mt-logo.png"></div>
<h3>MechToolbox</h3>
<p>Diagnostics and workshop tools</p>
</div>

<div class="app-card">
<div class="app-logo"><img src="bu-logo.png"></div>
<h3>BeastUtility</h3>
<p>Gym utility tools</p>
</div>

<div class="app-card">
<div class="app-logo"><img src="bb-logo.png"></div>
<h3>BeastBlueprint</h3>
<p>Program generator</p>
</div>

</div>

</section>

</body>
</html>
