<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BeastLabX – Company</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="BeastLabX builds practical, high-performance apps for real-world use.">

<style>

/* =============================================================
RESET
============================================================= */
*{
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:
linear-gradient(rgba(8,8,10,0.88), rgba(8,8,10,0.93)),
url('bg.png') center center / cover fixed no-repeat;
color:#e5e5e5;
}

/* =============================================================
HEADER
============================================================= */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
border-bottom:2px solid #1FA11F;
background:rgba(12,12,14,0.94);
backdrop-filter:blur(8px);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.logo{
display:flex;
align-items:center;
gap:14px;
font-size:20px;
font-weight:bold;
color:#ffffff;
text-decoration:none;
}

.logo img{
width:42px;
height:42px;
object-fit:cover;
border-radius:6px;
display:block;
box-shadow:0 0 16px rgba(0,0,0,0.35);
}

nav{
display:flex;
gap:26px;
align-items:center;
}

nav a{
position:relative;
text-decoration:none;
color:#ffffff;
font-size:16px;
transition:color 0.2s ease;
}

nav a:hover{
color:#1FA11F;
}

nav a.active{
color:#1FA11F;
}

nav a.active::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:-12px;
height:2px;
background:#1FA11F;
box-shadow:0 0 12px rgba(31,161,31,0.4);
}

/* =============================================================
HERO
============================================================= */
.hero{
position:relative;
padding:90px 40px 54px 40px;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
left:8%;
top:50px;
width:480px;
height:480px;
background:radial-gradient(circle, rgba(31,161,31,0.16) 0%, rgba(31,161,31,0.08) 34%, rgba(31,161,31,0.02) 60%, transparent 74%);
filter:blur(38px);
pointer-events:none;
}

.hero-inner{
position:relative;
z-index:1;
max-width:1320px;
margin:0 auto;
display:grid;
grid-template-columns:1.02fr 0.98fr;
gap:34px;
align-items:stretch;
}

/* ===== FIX APPLIED HERE ===== */
.hero-copy{
max-width:700px;
display:flex;
flex-direction:column;
justify-content:flex-start;
padding-top:40px;
}

.hero-kicker{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 16px;
border:1px solid rgba(31,161,31,0.32);
border-radius:999px;
background:rgba(20,20,24,0.78);
color:#d2d2d2;
font-size:13px;
text-transform:uppercase;
letter-spacing:1px;
margin-bottom:24px;
width:fit-content;
}

.hero-kicker img{
width:24px;
height:24px;
object-fit:cover;
border-radius:4px;
display:block;
}

.hero h1{
margin:0 0 18px 0;
font-size:70px;
line-height:0.98;
letter-spacing:-1.5px;
color:#ffffff;
}

.hero p{
margin:0;
font-size:20px;
line-height:1.75;
color:#bdbdbd;
max-width:640px;
}

.hero-buttons{
display:flex;
gap:16px;
flex-wrap:wrap;
margin-top:34px;
}

.button{
display:inline-flex;
align-items:center;
justify-content:center;
padding:16px 28px;
border-radius:14px;
text-decoration:none;
font-weight:bold;
font-size:16px;
}

.button.primary{
background:#1FA11F;
color:#ffffff;
}

.button.secondary{
background:rgba(20,20,24,0.85);
color:#ffffff;
border:1px solid #2a2a2a;
}

.hero-note{
margin-top:22px;
font-size:15px;
color:#8f8f8f;
}

.hero-ad{
position:relative;
display:block;
min-height:560px;
border-radius:30px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 26px 70px rgba(0,0,0,0.42);
text-decoration:none;
background:#0f0f12;
}

.hero-ad img{
width:100%;
height:100%;
display:block;
object-fit:cover;
object-position:center top;
}

/* =============================================================
APPS
============================================================= */
.apps{
padding:0 40px 70px 40px;
}

.apps-head{
max-width:1320px;
margin:0 auto 22px auto;
}

.apps-head h2{
margin:0;
font-size:34px;
color:#ffffff;
}

.apps-grid{
max-width:1320px;
margin:0 auto;
display:grid;
grid-template-columns:repeat(5, minmax(0, 1fr));
gap:22px;
}

.app-card{
display:block;
text-decoration:none;
background:#1c1c1c;
border-radius:26px;
padding:22px;
}

.app-logo-wrap{
width:72px;
height:72px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
}

.app-logo-wrap img{
width:100%;
height:100%;
object-fit:contain;
}

footer{
text-align:center;
padding:26px;
color:#7e7e7e;
}

</style>
</head>

<body>

<header>
<a href="index.html" class="logo">
<img src="logo.png">
<span>BeastLabX</span>
</a>
</header>

<section class="hero">
<div class="hero-inner">

<div class="hero-copy">
<div class="hero-kicker">
<img src="logo.png">
<span>Built for real-world apps</span>
</div>

<h1>BeastLabX</h1>

<p>
We build practical, high-performance apps for real-world use.
</p>

<div class="hero-buttons">
<a class="button primary" href="#">Explore</a>
<a class="button secondary" href="#">About</a>
</div>

<div class="hero-note">Practical software. Real-world use.</div>
</div>

<a class="hero-ad">
<img src="bl-ad.png">
</a>

</div>
</section>

<section class="apps">
<div class="apps-grid">

<div class="app-card">
<div class="app-logo-wrap">
<img src="bl-logo.png">
</div>
<h3>BeastLabX</h3>
</div>

<div class="app-card">
<div class="app-logo-wrap">
<img src="mt-logo.png">
</div>
<h3>MechToolbox</h3>
</div>

<div class="app-card">
<div class="app-logo-wrap">
<img src="bu-logo.png">
</div>
<h3>BeastUtility</h3>
</div>

<div class="app-card">
<div class="app-logo-wrap">
<img src="bb-logo.png">
</div>
<h3>BeastBlueprint</h3>
</div>

</div>
</section>

<footer>
BeastLabX Pty ltd
</footer>

</body>
</html>
